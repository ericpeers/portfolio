basePath: /
definitions:
  models.AddGlanceRequest:
    properties:
      portfolio_id:
        type: integer
    required:
    - portfolio_id
    type: object
  models.AlphaBeta:
    properties:
      alpha:
        type: number
      beta:
        type: number
    type: object
  models.BasketHolding:
    properties:
      buy_sell:
        $ref: '#/definitions/models.BuySell'
      coverage_weight:
        type: number
      direct_fill:
        type: number
      ideal_allocation:
        type: number
      redeemed_fill:
        type: number
      security_id:
        type: integer
      ticker:
        type: string
    type: object
  models.BasketLevel:
    properties:
      holdings:
        items:
          $ref: '#/definitions/models.BasketHolding'
        type: array
      threshold:
        type: number
      total_fill:
        type: number
    type: object
  models.BasketResult:
    properties:
      basket_20:
        $ref: '#/definitions/models.BasketLevel'
      basket_40:
        $ref: '#/definitions/models.BasketLevel'
      basket_60:
        $ref: '#/definitions/models.BasketLevel'
      basket_80:
        $ref: '#/definitions/models.BasketLevel'
      basket_100:
        $ref: '#/definitions/models.BasketLevel'
    type: object
  models.BenchmarkMetrics:
    properties:
      dow_jones:
        allOf:
        - $ref: '#/definitions/models.AlphaBeta'
        description: vs. ^DIA
      sp500:
        allOf:
        - $ref: '#/definitions/models.AlphaBeta'
        description: vs. ^GSPC
    type: object
  models.BulkFetchResult:
    properties:
      date:
        type: string
      exchange:
        type: string
      fetched:
        type: integer
      skipped:
        type: integer
      stored:
        type: integer
    type: object
  models.BuySell:
    properties:
      dollars:
        type: number
      shares:
        type: number
    type: object
  models.CompareRequest:
    properties:
      end_period:
        example: "2025-12-31"
        type: string
      portfolio_a:
        type: integer
      portfolio_b:
        type: integer
      start_period:
        example: "2025-12-01"
        type: string
    required:
    - end_period
    - portfolio_a
    - portfolio_b
    - start_period
    type: object
  models.CompareResponse:
    properties:
      absolute_similarity_score:
        type: number
      baskets:
        $ref: '#/definitions/models.BasketResult'
      performance_metrics:
        $ref: '#/definitions/models.PerformanceMetrics'
      portfolio_a:
        $ref: '#/definitions/models.PortfolioSummary'
      portfolio_b:
        $ref: '#/definitions/models.PortfolioSummary'
      warnings:
        items:
          $ref: '#/definitions/models.Warning'
        type: array
    type: object
  models.CreatePortfolioRequest:
    properties:
      created_at:
        description: |-
          CreatedAt is the date the portfolio began trading or was built.
          Reflects when the strategy was initiated, not when it was imported into this system.
          Accepts "YYYY-MM-DD" or RFC3339. Defaults to the current timestamp if omitted.
        example: "2023-06-01"
        type: string
      memberships:
        items:
          $ref: '#/definitions/models.MembershipRequest'
        type: array
      name:
        type: string
      objective:
        $ref: '#/definitions/models.Objective'
      owner_id:
        type: integer
      portfolio_type:
        $ref: '#/definitions/models.PortfolioType'
      snapshotted_at:
        description: |-
          SnapshottedAt records when the membership share counts were entered into this system.
          Used to reverse stock splits that occurred between created_at and this date,
          so historical performance is computed with correct pre-split share counts.
        example: "2025-03-15"
        type: string
    required:
    - name
    - objective
    - owner_id
    - portfolio_type
    type: object
  models.DailyValue:
    properties:
      date:
        type: string
      value:
        type: number
    type: object
  models.ETFHoldingDTO:
    properties:
      name:
        type: string
      percentage:
        type: number
      security_id:
        type: integer
      ticker:
        type: string
    type: object
  models.ErrorResponse:
    properties:
      error:
        type: string
      message:
        type: string
    type: object
  models.ExpandedMembership:
    properties:
      allocation:
        description: Decimal allocation (0.60 = 60%)
        type: number
      security_id:
        type: integer
      sources:
        items:
          $ref: '#/definitions/models.MembershipSource'
        type: array
      ticker:
        type: string
    type: object
  models.GetDailyPricesResponse:
    properties:
      data_points:
        type: integer
      end_date:
        type: string
      prices:
        items:
          $ref: '#/definitions/models.PriceData'
        type: array
      security_id:
        type: integer
      start_date:
        type: string
      ticker:
        type: string
    type: object
  models.GetETFHoldingsResponse:
    properties:
      holdings:
        items:
          $ref: '#/definitions/models.ETFHoldingDTO'
        type: array
      name:
        type: string
      pull_date:
        type: string
      security_id:
        type: integer
      ticker:
        type: string
      warnings:
        items:
          $ref: '#/definitions/models.Warning'
        type: array
    type: object
  models.GlanceListResponse:
    properties:
      portfolios:
        items:
          $ref: '#/definitions/models.GlancePortfolio'
        type: array
    type: object
  models.GlancePortfolio:
    properties:
      current_value:
        type: number
      daily_return:
        $ref: '#/definitions/models.ReturnMetric'
      life_of_portfolio_return:
        $ref: '#/definitions/models.ReturnMetric'
      name:
        type: string
      one_month_return:
        $ref: '#/definitions/models.ReturnMetric'
      one_year_return:
        $ref: '#/definitions/models.ReturnMetric'
      portfolio_id:
        type: integer
      valuation_date:
        type: string
      warnings:
        items:
          $ref: '#/definitions/models.Warning'
        type: array
    type: object
  models.ImportPricesResult:
    properties:
      dry_run:
        type: boolean
      failed:
        type: integer
      inserted:
        type: integer
      unknown_tickers:
        items:
          type: string
        type: array
    type: object
  models.LoadIPODatesResponse:
    properties:
      file_duplicates:
        type: integer
      inserted:
        type: integer
      mismatches:
        items:
          $ref: '#/definitions/models.MismatchedIPODate'
        type: array
      no_match:
        type: integer
      skipped:
        type: integer
    type: object
  models.LoadSecuritiesResponse:
    properties:
      dry_run:
        type: boolean
      inserted:
        type: integer
      new_exchanges:
        items:
          type: string
        type: array
      skipped_bad_type:
        type: integer
      skipped_dup_in_file:
        type: integer
      skipped_existing:
        type: integer
      skipped_long_ticker:
        type: integer
      truncated_name:
        type: integer
      updated_isin:
        type: integer
      warnings:
        items:
          type: string
        type: array
    type: object
  models.MembershipRequest:
    properties:
      percentage_or_shares:
        type: number
      security_id:
        type: integer
      ticker:
        type: string
    required:
    - percentage_or_shares
    type: object
  models.MembershipSource:
    properties:
      allocation:
        description: Proportion of this security's allocation from this source (sums
          to 1.0)
        type: number
      security_id:
        type: integer
      ticker:
        type: string
    type: object
  models.MismatchedIPODate:
    properties:
      csv_date:
        type: string
      db_date:
        type: string
      name:
        type: string
      ticker:
        type: string
    type: object
  models.Objective:
    enum:
    - Aggressive Growth
    - Growth
    - Income Generation
    - Capital Preservation
    - Mixed Growth/Income
    type: string
    x-enum-varnames:
    - ObjectiveAggressiveGrowth
    - ObjectiveGrowth
    - ObjectiveIncomeGeneration
    - ObjectiveCapitalPreservation
    - ObjectiveMixedGrowthIncome
  models.PerformanceMetrics:
    properties:
      portfolio_a_metrics:
        $ref: '#/definitions/models.PortfolioPerformance'
      portfolio_b_metrics:
        $ref: '#/definitions/models.PortfolioPerformance'
    type: object
  models.Portfolio:
    properties:
      comment:
        type: string
      created_at:
        type: string
      ended_at:
        type: string
      id:
        type: integer
      name:
        type: string
      objective:
        $ref: '#/definitions/models.Objective'
      owner_id:
        type: integer
      portfolio_type:
        $ref: '#/definitions/models.PortfolioType'
      snapshotted_at:
        type: string
      updated_at:
        type: string
    type: object
  models.PortfolioListItem:
    properties:
      created_at:
        type: string
      id:
        type: integer
      name:
        type: string
      objective:
        $ref: '#/definitions/models.Objective'
      portfolio_type:
        $ref: '#/definitions/models.PortfolioType'
      updated_at:
        type: string
    type: object
  models.PortfolioMembership:
    properties:
      percentage_or_shares:
        type: number
      portfolio_id:
        type: integer
      security_id:
        type: integer
      ticker:
        type: string
    type: object
  models.PortfolioPerformance:
    properties:
      benchmark_metrics:
        $ref: '#/definitions/models.BenchmarkMetrics'
      daily_values:
        items:
          $ref: '#/definitions/models.DailyValue'
        type: array
      dividends:
        type: number
      end_value:
        type: number
      gain_dollar:
        type: number
      gain_percent:
        type: number
      sharpe_ratios:
        $ref: '#/definitions/models.SharpeRatios'
      sortino_ratios:
        $ref: '#/definitions/models.SortinoRatios'
      start_value:
        type: number
    type: object
  models.PortfolioSummary:
    properties:
      direct_membership:
        items:
          $ref: '#/definitions/models.ExpandedMembership'
        type: array
      expanded_memberships:
        items:
          $ref: '#/definitions/models.ExpandedMembership'
        type: array
      id:
        type: integer
      name:
        type: string
      type:
        $ref: '#/definitions/models.PortfolioType'
    type: object
  models.PortfolioType:
    enum:
    - Ideal
    - Active
    - Historic
    type: string
    x-enum-varnames:
    - PortfolioTypeIdeal
    - PortfolioTypeActive
    - PortfolioTypeHistoric
  models.PortfolioWithMemberships:
    properties:
      memberships:
        items:
          $ref: '#/definitions/models.PortfolioMembership'
        type: array
      portfolio:
        $ref: '#/definitions/models.Portfolio'
      warnings:
        items:
          $ref: '#/definitions/models.Warning'
        type: array
    type: object
  models.PriceData:
    properties:
      close:
        type: number
      date:
        type: string
      high:
        type: number
      low:
        type: number
      open:
        type: number
      security_id:
        type: integer
      volume:
        type: integer
    type: object
  models.ReturnMetric:
    properties:
      dollar:
        type: number
      percentage:
        type: number
      start_date:
        type: string
    type: object
  models.SharpeRatios:
    properties:
      daily:
        type: number
      monthly:
        type: number
      three_month:
        type: number
      yearly:
        type: number
    type: object
  models.SortinoRatios:
    properties:
      daily:
        type: number
      monthly:
        type: number
      three_month:
        type: number
      yearly:
        type: number
    type: object
  models.UpdatePortfolioRequest:
    properties:
      created_at:
        description: |-
          CreatedAt is the date the portfolio began trading or was built.
          Reflects when the strategy was initiated, not when it was imported into this system.
          Accepts "YYYY-MM-DD" or RFC3339. If omitted, the existing value is preserved.
        example: "2023-06-01"
        type: string
      memberships:
        items:
          $ref: '#/definitions/models.MembershipRequest'
        type: array
      name:
        type: string
      objective:
        $ref: '#/definitions/models.Objective'
      portfolio_type:
        $ref: '#/definitions/models.PortfolioType'
      snapshotted_at:
        description: |-
          SnapshottedAt records when the membership share counts were entered into this system.
          If omitted, the existing value is preserved.
        example: "2025-03-15"
        type: string
    type: object
  models.Warning:
    properties:
      code:
        $ref: '#/definitions/models.WarningCode'
      message:
        type: string
    type: object
  models.WarningCode:
    enum:
    - W1001
    - W1002
    - W1003
    - W2001
    - W3001
    - W3002
    - W4001
    - W4002
    type: string
    x-enum-comments:
      WarnBenchmarkDataUnavailable: benchmark ticker missing or has no price data;
        Alpha/Beta set to zero
      WarnETFSourceIncomplete: source ETF data does not add up to 100%
      WarnExcessiveForwardFill: too many securities needed forward-filling on some
        dates; those dates excluded
      WarnFuzzyMatchSubstituted: dash-inserted ticker used in place of original (e.g.
        BRKB → BRK-B)
      WarnMissingPriceHistory: one or more securities have no price history; affected
        dates excluded
      WarnPartialETFExpansion: holdings scaled to 100% because resolved weights didn't
        sum to 1.0
      WarnStartDateAdjusted: start date adjusted to security inception date
      WarnUnresolvedETFHolding: individual unresolved holding (dropped from results)
    x-enum-descriptions:
    - individual unresolved holding (dropped from results)
    - holdings scaled to 100% because resolved weights didn't sum to 1.0
    - source ETF data does not add up to 100%
    - dash-inserted ticker used in place of original (e.g. BRKB → BRK-B)
    - one or more securities have no price history; affected dates excluded
    - too many securities needed forward-filling on some dates; those dates excluded
    - start date adjusted to security inception date
    - benchmark ticker missing or has no price data; Alpha/Beta set to zero
    x-enum-varnames:
    - WarnUnresolvedETFHolding
    - WarnPartialETFExpansion
    - WarnETFSourceIncomplete
    - WarnFuzzyMatchSubstituted
    - WarnMissingPriceHistory
    - WarnExcessiveForwardFill
    - WarnStartDateAdjusted
    - WarnBenchmarkDataUnavailable
host: localhost:8080
info:
  contact: {}
  description: A CRUD server for analyzing financial portfolios comprising stocks,
    bonds, and ETFs.
  title: Portfolio API
  version: "1.0"
paths:
  /admin/bulk-fetch-eodhd-prices:
    get:
      description: Fetches end-of-day prices for all US securities from EODHD and
        stores them in the price cache. Always targets the US exchange — EODHD bulk
        fetch is only cost-effective for US equities.
      parameters:
      - description: Date to fetch (YYYY-MM-DD, defaults to today)
        in: query
        name: date
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.BulkFetchResult'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      summary: Bulk fetch EODHD end-of-day prices for the US exchange
      tags:
      - admin
  /admin/export-prices:
    get:
      description: 'Dump price data as CSV with ticker and exchange columns instead
        of security_id. Optional filters: ticker, start_date, end_date (YYYY-MM-DD).'
      parameters:
      - description: Filter by ticker symbol
        in: query
        name: ticker
        type: string
      - description: Filter start date (YYYY-MM-DD)
        in: query
        name: start_date
        type: string
      - description: Filter end date (YYYY-MM-DD)
        in: query
        name: end_date
        type: string
      produces:
      - text/csv
      responses:
        "200":
          description: CSV data
          schema:
            type: string
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      summary: Export fact_price rows as CSV
      tags:
      - admin
  /admin/get_daily_prices:
    get:
      description: Fetch daily price data for a security by ticker or ID
      parameters:
      - description: Security ticker symbol
        in: query
        name: ticker
        type: string
      - description: Security ID
        in: query
        name: security_id
        type: integer
      - description: Start date (YYYY-MM-DD)
        in: query
        name: start_date
        required: true
        type: string
      - description: End date (YYYY-MM-DD)
        in: query
        name: end_date
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.GetDailyPricesResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      summary: Get daily prices for a security
      tags:
      - admin
  /admin/get_etf_holdings:
    get:
      description: Fetch holdings for an ETF or mutual fund by ticker or ID
      parameters:
      - description: ETF ticker symbol
        in: query
        name: ticker
        type: string
      - description: Security ID
        in: query
        name: security_id
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.GetETFHoldingsResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      summary: Get ETF holdings
      tags:
      - admin
  /admin/import-prices:
    post:
      consumes:
      - multipart/form-data
      description: Parse a CSV (ticker,exchange,date,open,high,low,close,volume) and
        upsert into fact_price. Resolves (ticker,exchange) to security_id. Pass dry_run=true
        to validate without writing.
      parameters:
      - description: CSV file
        in: formData
        name: file
        required: true
        type: file
      - description: Set to 'true' to validate without writing
        in: formData
        name: dry_run
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.ImportPricesResult'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      summary: Import price data from CSV
      tags:
      - admin
  /admin/load_etf_holdings:
    post:
      consumes:
      - multipart/form-data
      description: 'Parse a CSV (Symbol,Company,Weight) and persist holdings for an
        ETF or mutual fund. Bypasses the postgres check: persists it always'
      parameters:
      - description: ETF ticker symbol
        in: formData
        name: ticker
        type: string
      - description: Security ID
        in: formData
        name: security_id
        type: integer
      - description: CSV file (Symbol,Company,Weight)
        in: formData
        name: file
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.GetETFHoldingsResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      summary: Load ETF holdings from a CSV upload
      tags:
      - admin
  /admin/load_securities:
    post:
      consumes:
      - multipart/form-data
      description: Parse a CSV (ticker,name,exchange,type[,currency,isin,country])
        and bulk-insert securities into dim_security. Pass dry_run=true to validate
        and preview without writing. Also updates ISIN on existing securities when
        the CSV provides one.
      parameters:
      - description: CSV file (ticker,name,exchange,type[,currency,isin,country])
        in: formData
        name: file
        required: true
        type: file
      - description: Set to 'true' to validate without writing (returns new_exchanges
          and row counts)
        in: formData
        name: dry_run
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.LoadSecuritiesResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      summary: Load securities from a CSV upload
      tags:
      - admin
  /admin/load_securities/ipo:
    post:
      consumes:
      - multipart/form-data
      description: Parse a CSV (Ticker, Name, Exchange, IPO date) and update dim_security.inception
        for matching US securities.
      parameters:
      - description: CSV file (Ticker, Name, Exchange, IPO date)
        in: formData
        name: file
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.LoadIPODatesResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      summary: Load IPO dates from a CSV upload
      tags:
      - admin
  /admin/sync-securities-from-av:
    post:
      description: Synchronize the securities database with AlphaVantage listing status.
        Pass type=dryrun to simulate without writes.
      parameters:
      - description: 'Run mode: omit for live sync, ''dryrun'' or ''dry_run'' for
          simulation'
        in: query
        name: type
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      summary: Sync securities from AlphaVantage
      tags:
      - admin
  /portfolios:
    post:
      consumes:
      - application/json
      - multipart/form-data
      description: Create a new portfolio with optional memberships. Accepts JSON
        or multipart/form-data with a CSV file.
      parameters:
      - description: Portfolio to create (JSON)
        in: body
        name: portfolio
        schema:
          $ref: '#/definitions/models.CreatePortfolioRequest'
      - description: Portfolio metadata as JSON (multipart)
        in: formData
        name: metadata
        type: string
      - description: CSV file with ticker,percentage_or_shares columns (multipart)
        in: formData
        name: memberships
        type: file
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.PortfolioWithMemberships'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      summary: Create a new portfolio
      tags:
      - portfolios
  /portfolios/{id}:
    delete:
      description: Delete a portfolio by ID
      parameters:
      - description: Portfolio ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
